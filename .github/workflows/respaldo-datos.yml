name: Respaldo de resultados

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  respaldo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descargar el almacén en vivo
        run: |
          curl -sf --retry 3 \
            https://kvdb.io/EYNBu6XbG1FQJ8rhy2sCGF/resultados \
            -o /tmp/resultados.json
          python3 -m json.tool /tmp/resultados.json > /dev/null
          mkdir -p data
          cp /tmp/resultados.json data/resultados.json

      - name: Commit si cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/resultados.json
          git diff --cached --quiet || {
            git commit -m "respaldo automático de resultados"
            git push
          }
